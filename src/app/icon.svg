<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f4a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc" />
      <stop offset="100%" stop-color="#e0f2fe" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" />

  <!-- Outer Ring (Connection vibe) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring-grad)" stroke-width="24" opacity="0.4" />
  
  <!-- O and C Letters -->
  <g fill="#ffffff">
    <!-- Letter O -->
    <path d="M 200 160 A 80 80 0 1 0 200 352 A 80 80 0 1 0 200 160 Z M 200 196 A 44 44 0 1 1 200 316 A 44 44 0 1 1 200 196 Z" />
    
    <!-- Letter C -->
    <path d="M 360 168 A 80 80 0 0 0 300 160 A 80 80 0 0 0 300 352 A 80 80 0 0 0 360 344 L 350 312 A 44 44 0 0 1 300 316 A 44 44 0 0 1 300 196 A 44 44 0 0 1 350 200 Z" />
  </g>

  <!-- Small connecting dots (Connection theme) -->
  <circle cx="360" cy="168" r="16" fill="#7dd3fc" />
  <circle cx="360" cy="344" r="16" fill="#7dd3fc" />
</svg>