<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f4a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Connection Lines -->
  <line x1="160" y1="256" x2="352" y2="180" stroke="#ffffff" stroke-width="16" stroke-linecap="round" />
  <line x1="160" y1="256" x2="352" y2="332" stroke="#ffffff" stroke-width="16" stroke-linecap="round" />

  <!-- Connection Nodes -->
  <circle cx="160" cy="256" r="40" fill="#ffffff" />
  <circle cx="352" cy="180" r="32" fill="#7dd3fc" />
  <circle cx="352" cy="332" r="32" fill="#93c5fd" />
